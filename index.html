function getLink(item){
 if(item.lat && item.lng) return `https://www.google.com/maps?q=${item.lat},${item.lng}`;
 return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.direccion)}`;
}

function render(lista){
 const cont = document.getElementById("contenedor");
 cont.innerHTML="";
 lista.forEach(item=>{
   cont.innerHTML += `
   <div class="card">
     <h3>${item.agencia}</h3>
     <p><span class="label">Dirección:</span> ${item.direccion}</p>
     <p><span class="label">Correo:</span> ${item.correo || "No disponible"}</p>
     <p><span class="label">Refrigerio:</span> ${item.refrigerio || "No disponible"}</p>
     <a class="btn" href="${getLink(item)}" target="_blank">Ver ubicación</a>
   </div>`;
 });
}

function filtrar(q){
 q = q.toLowerCase();
 render(data.filter(x=> 
   x.agencia.toLowerCase().includes(q) ||
   x.direccion.toLowerCase().includes(q)
 ));
}

render(data);
