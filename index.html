<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio Banco Alfin</title>
<style>
:root {
  --orange:#ff5a1f;
  --orange-dark:#f04c10;
  --purple:#7b1fa2;
  --purple-dark:#5f1687;
  --text:#2e2341;
  --muted:#786f88;
  --border:#f0d7cb;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:
    radial-gradient(circle at top right, rgba(123,31,162,.10), transparent 24%),
    linear-gradient(180deg, #fff6f2 0%, #fff 100%);
  color:var(--text);
}
.topbar{
  background:linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%);
  padding:20px 18px;
  position:sticky;
  top:0;
  z-index:10;
  box-shadow:0 10px 28px rgba(240,76,16,.22);
}
.topbar-inner{
  max-width:1220px;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:16px}
.brand img{height:56px;width:auto;display:block;border-radius:14px}
.brand-text h1{margin:0;color:#fff;font-size:28px;line-height:1.05}
.brand-text p{margin:6px 0 0;color:rgba(255,255,255,.93);font-size:14px}
.summary{
  background:rgba(255,255,255,.16);
  color:#fff;
  border:1px solid rgba(255,255,255,.22);
  border-radius:16px;
  padding:12px 16px;
  font-weight:700;
  white-space:nowrap;
}
.page{max-width:1220px;margin:0 auto;padding:24px 18px 42px}
.controls{
  display:grid;
  grid-template-columns:1.5fr 1fr 1fr 1fr;
  gap:14px;
  margin-bottom:20px;
}
.control{
  background:#fff;
  border:1px solid var(--border);
  border-radius:20px;
  padding:14px;
  box-shadow:0 10px 24px rgba(61,35,20,.05);
}
.control label{
  display:block;
  margin-bottom:8px;
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.45px;
  color:var(--purple);
}
.control input,.control select{
  width:100%;
  padding:11px 12px;
  border:1px solid #ead8ef;
  border-radius:12px;
  font-size:14px;
  color:var(--text);
  outline:none;
  background:#fff;
}
.control input:focus,.control select:focus{
  border-color:var(--purple);
  box-shadow:0 0 0 3px rgba(123,31,162,.12);
}
.results{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:16px;
}
.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:24px;
  padding:18px;
  box-shadow:0 12px 28px rgba(61,35,20,.06);
  display:flex;
  flex-direction:column;
  gap:12px;
  transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease;
  animation:fadeUp .45s ease both;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 16px 34px rgba(61,35,20,.10);
  border-color:#e8c7da;
}
.badge{
  align-self:flex-start;
  background:rgba(123,31,162,.08);
  color:var(--purple);
  border:1px solid rgba(123,31,162,.16);
  border-radius:999px;
  padding:6px 10px;
  font-size:12px;
  font-weight:700;
}
.card h3{margin:0;color:var(--orange-dark);font-size:24px;line-height:1.08}
.meta{color:var(--muted);font-size:14px;line-height:1.45}
.row{display:flex;flex-direction:column;gap:4px}
.label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--purple)}
.value{font-size:14px;line-height:1.5;color:var(--text);word-break:break-word}
.value a{color:var(--purple-dark);font-weight:700;text-decoration:none}
.actions{margin-top:auto;display:flex;gap:10px;flex-wrap:wrap;padding-top:8px}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  border-radius:12px;
  padding:10px 14px;
  font-size:14px;
  font-weight:700;
  transition:transform .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease;
  border:1px solid transparent;
}
.btn:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 18px rgba(0,0,0,.08);
}
.btn-primary{background:var(--orange);color:#fff}
.btn-secondary{background:#fff;color:var(--purple);border-color:#e4d0ed}
.empty{
  background:#fff;border:1px dashed #d8bfd4;border-radius:20px;padding:32px 20px;
  text-align:center;color:var(--muted);
}
.footer{text-align:center;margin-top:28px;color:var(--muted);font-size:12px}
@media (max-width:980px){ .controls{grid-template-columns:1fr 1fr} }
@media (max-width:680px){
  .controls{grid-template-columns:1fr}
  .brand-text h1{font-size:24px}
  .brand img{height:48px}
  .summary{width:100%;text-align:center}
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
  
}
</style>
</head>

const resultsEl = document.getElementById("results");
const summaryBox = document.getElementById("summaryBox");
const searchEl = document.getElementById("search");
const departamentoEl = document.getElementById("departamento");
const provinciaEl = document.getElementById("provincia");
const distritoEl = document.getElementById("distrito");
let lastCount = 0;
  
function normalize(text) {
  return (text || "").toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
}

function hasCoords(item) {
  return item.lat !== "" && item.lng !== "";
}

function mapLink(item) {
  if (hasCoords(item)) {
    return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.lat + "," + item.lng)}`;
  }
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.direccion || item.agencia)}`;
}
function animateCounter(target){
  const start = lastCount;
  const end = target;
  const duration = 450;
  const startTime = performance.now();

  function update(now){
    const progress = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(start + (end - start) * eased);

summaryBox.textContent = `${current} agencias${current === 1 ? "" : "s"} mostradas${current === 1 ? "" : "s"}`;
    if(progress < 1){
      requestAnimationFrame(update);
    } else {
      lastCount = end;
    }
  }

  requestAnimationFrame(update);
}
  

function uniqueValues(items, key) {
  return [...new Set(items.map(x => x[key]).filter(Boolean))].sort((a,b) => a.localeCompare(b, "es"));
}

function fillSelect(select, values, placeholder) {
  const current = select.value;
  select.innerHTML = `<option value="">${placeholder}</option>`;
  values.forEach(value => {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = value;
    select.appendChild(option);
  });
  if ([...select.options].some(o => o.value === current)) select.value = current;
}

function updateFilters() {
  const dep = departamentoEl.value;
  fillSelect(provinciaEl, uniqueValues(agencies.filter(item => !dep || item.departamento === dep), "provincia"), "Todas");
  const prov = provinciaEl.value;
  fillSelect(distritoEl, uniqueValues(agencies.filter(item =>
    (!dep || item.departamento === dep) && (!prov || item.provincia === prov)
  ), "distrito"), "Todos");
}

function render() {
  const q = normalize(searchEl.value);
  const dep = departamentoEl.value;
  const prov = provinciaEl.value;
  const dist = distritoEl.value;

  const filtered = agencies.filter(item => {
    const inSearch = !q ||
      normalize(item.agencia).includes(q) ||
      normalize(item.direccion).includes(q) ||
      normalize(item.gerente).includes(q) ||
      normalize(item.correo).includes(q) ||
      normalize(item.departamento).includes(q) ||
      normalize(item.provincia).includes(q) ||
      normalize(item.distrito).includes(q);

    return inSearch &&
      (!dep || item.departamento === dep) &&
      (!prov || item.provincia === prov) &&
      (!dist || item.distrito === dist);
  });

animateCounter(filtered.length);
  if (!filtered.length) {
    resultsEl.innerHTML = `<div class="empty">No se encontraron agencias con esos filtros.</div>`;
    return;
  }

  resultsEl.innerHTML = filtered.map(item => `
    <div class="card">
      <div class="badge">${item.region || item.departamento || "Banco Alfin"}</div>
      <h3>${item.agencia || "Sin nombre"}</h3>
      <div class="meta">${[item.distrito, item.provincia, item.departamento].filter(Boolean).join(" · ")}</div>

      <div class="row">
        <div class="label">📍 Dirección</div>
        <div class="value">${item.direccion || "No disponible"}</div>
      </div>

      <div class="row">
        <div class="label">👤 Gerente de agencia</div>
        <div class="value">${item.gerente || "No disponible"}</div>
      </div>

      <div class="row">
        <div class="label">📧 Correo de gerente</div>
        <div class="value">${item.correo ? `<a href="mailto:${item.correo}">${item.correo}</a>` : "No disponible"}</div>
      </div>

      <div class="row">
        <div class="label">🕐 Horario de refrigerio</div>
        <div class="value">${item.refrigerio || "No disponible"}</div>
      </div>

      <div class="actions">
        <a class="btn btn-primary" href="${mapLink(item)}" target="_blank" rel="noopener noreferrer">Ver ubicación</a>
        ${item.correo ? `<a class="btn btn-secondary" href="mailto:${item.correo}">Enviar correo</a>` : ""}
      </div>
    </div>
  `).join("");
}

fillSelect(departamentoEl, uniqueValues(agencies, "departamento"), "Todos");
updateFilters();
render();

searchEl.addEventListener("input", render);
departamentoEl.addEventListener("change", () => { updateFilters(); render(); });
provinciaEl.addEventListener("change", () => { updateFilters(); render(); });
distritoEl.addEventListener("change", render);
</script>
